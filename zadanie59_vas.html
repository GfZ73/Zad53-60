
<!DOCTYPE html><html><body><script>
var a=parseInt(prompt("Liczba 1"));
var b=parseInt(prompt("Liczba 2"));
if(a==b){confirm("Liczby są równe - brak obliczeń");}
else if(a<b){for(let i=a;i<=b;i++) if(i%2!=0) document.write("<span style='color:green;font-size:30px'>"+i+"</span><br>");}
else{for(let i=a;i>=b;i--) if(i%2!=0) document.write("<span style='color:blue;font-size:15px'>"+i+"</span><br>");}
</script></body></html>
